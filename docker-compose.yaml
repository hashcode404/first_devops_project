services:

  frontend:
    build:
      context: ./frontend

    ports:
      - "80:80"

    depends_on:
      - backend

  backend:
    build:
      context: ./backend

    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: